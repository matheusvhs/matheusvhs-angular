server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:portfoliodb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

portfolio:
  admin:
    username: admin
    password: changeme
  cors:
    allowed-origin: http://localhost:4200
