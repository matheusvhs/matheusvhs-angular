name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: testes + cobertura + SonarCloud ─────────────────────────────────
  backend-ci:
    name: Backend — Test & Sonar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo para análise do Sonar

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests + JaCoCo coverage
        run: ./mvnw verify -B -Djacoco.skip=false
        working-directory: backend

      - name: SonarCloud analysis
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ./mvnw sonar:sonar -B \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Frontend: build + testes + cobertura + SonarCloud ───────────────────────
  frontend-ci:
    name: Frontend — Build, Test & Sonar
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (TypeScript check)
        run: npm run build -- --configuration=production
        working-directory: frontend

      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: frontend

      - name: SonarCloud analysis
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Docker build (apenas em push para main) ──────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t portfolio-backend ./backend

      - name: Build frontend image
        run: docker build -t portfolio-frontend ./frontend
